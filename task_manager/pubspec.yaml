name: task_manager
description: A professional task manager app with SQLite storage.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.19.0
